<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 500" preserveAspectRatio="xMidYMax slice">
  <defs>
    <style>
      .hill-ground   { fill: var(--hill-ground, #446954); }
      .trunk         { fill: var(--trunk, #4a3010); }
      .foliage-light { fill: var(--foliage-light, #6aaa4a); }
      .foliage-dark  { fill: var(--foliage-dark, #5a9a3a); }
      .flower        { fill: var(--flower, #ffb0c8); }
      .flower-light  { fill: var(--flower-light, #ffc0d0); }
      .flower-pale   { fill: var(--flower-pale, #ffd0e0); }
      .flower-paler  { fill: var(--flower-paler, #ffe0e8); }
    </style>
    <g id="tree-large">
      <rect class="trunk" x="-1.5" y="-12" width="3" height="12" rx="0.5"/>
      <circle class="foliage-light" cx="0" cy="-18" r="8"/>
      <circle class="foliage-dark" cx="-5" cy="-14" r="6"/>
      <circle class="foliage-dark" cx="5" cy="-14" r="6"/>
      <circle class="flower" cx="-3" cy="-20" r="2.5"/>
      <circle class="flower-light" cx="4" cy="-17" r="2"/>
      <circle class="flower" cx="-1" cy="-14" r="2.5"/>
    </g>
    <g id="tree-small">
      <rect class="trunk" x="-1.5" y="-10" width="3" height="10" rx="0.5"/>
      <circle class="foliage-light" cx="0" cy="-16" r="7"/>
