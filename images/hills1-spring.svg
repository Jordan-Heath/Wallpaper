      <circle class="foliage-dark" cx="4" cy="-12" r="5"/>
      <circle class="flower" cx="-2" cy="-18" r="2"/>
      <circle class="flower-light" cx="3" cy="-15" r="2"/>
    </g>
    <g id="cluster-3">
