      <circle class="flower-light" cx="-6" cy="-2" r="2"/>
      <circle class="flower-pale" cx="5" cy="-5" r="2"/>
      <circle class="flower-paler" cx="2" cy="-7" r="1.5"/>
    </g>
    <g id="cluster-5">
