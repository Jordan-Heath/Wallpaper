<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 90">
  <defs>
    <style>
      .cloud-base { fill: var(--cloud-base, #ccc); }
      .cloud-hl  { fill: var(--cloud-highlight, #fff); }
    </style>
    <clipPath id="cloudClip">
      <circle cx="50" cy="58" r="30"/>
      <circle cx="95" cy="45" r="35"/>
      <circle cx="140" cy="48" r="33"/>
      <circle cx="180" cy="58" r="28"/>
      <rect x="16" y="58" width="188" height="18" rx="9"/>
    </clipPath>
  </defs>
  <g class="cloud-base">
    <circle cx="50" cy="58" r="30"/>
    <circle cx="95" cy="45" r="35"/>
    <circle cx="140" cy="48" r="33"/>
    <circle cx="180" cy="58" r="28"/>
    <rect x="16" y="58" width="188" height="18" rx="9"/>
  </g>
  <g clip-path="url(#cloudClip)">
    <g class="cloud-hl" transform="translate(-20, -20)" opacity="0.4">
      <circle cx="50" cy="58" r="30"/>
      <circle cx="95" cy="45" r="35"/>
      <circle cx="140" cy="48" r="33"/>
      <circle cx="180" cy="58" r="28"/>
      <rect x="16" y="58" width="188" height="18" rx="9"/>
    </g>
  </g>
</svg>
