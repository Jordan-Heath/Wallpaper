<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 110">
  <defs>
    <style>
      .cloud-base { fill: var(--cloud-base, #ccc); }
      .cloud-hl  { fill: var(--cloud-highlight, #fff); }
    </style>
    <clipPath id="cloudClip">
      <ellipse cx="45" cy="72" rx="38" ry="28"/>
      <ellipse cx="95" cy="60" rx="48" ry="34"/>
      <ellipse cx="145" cy="68" rx="40" ry="28"/>
      <ellipse cx="185" cy="75" rx="30" ry="22"/>
      <ellipse cx="70" cy="48" rx="24" ry="22"/>
      <rect x="10" y="75" width="194" height="18" rx="9"/>
    </clipPath>
  </defs>

  <g class="cloud-base">
    <ellipse cx="45" cy="72" rx="38" ry="28"/>
    <ellipse cx="95" cy="60" rx="48" ry="34"/>
    <ellipse cx="145" cy="68" rx="40" ry="28"/>
    <ellipse cx="185" cy="75" rx="30" ry="22"/>
    <ellipse cx="70" cy="48" rx="24" ry="22"/>
    <rect x="10" y="75" width="194" height="18" rx="9"/>
  </g>

  <g clip-path="url(#cloudClip)">
    <g class="cloud-hl" transform="translate(-20, -20)" opacity="0.4">
      <ellipse cx="45" cy="72" rx="38" ry="28"/>
      <ellipse cx="95" cy="60" rx="48" ry="34"/>
      <ellipse cx="145" cy="68" rx="40" ry="28"/>
      <ellipse cx="185" cy="75" rx="30" ry="22"/>
      <ellipse cx="70" cy="48" rx="24" ry="22"/>
      <rect x="10" y="75" width="194" height="18" rx="9"/>
    </g>
  </g>
</svg>
