  <use href="#cluster-4" x="180" y="468"/>
  <use href="#cluster-5" x="310" y="458"/>
  <circle class="flower-light" cx="350" cy="460" r="2"/>
  <use href="#cluster-3" x="480" y="468"/>
  <circle class="flower" cx="550" cy="470" r="2"/>
  <use href="#cluster-4" x="650" y="470"/>
