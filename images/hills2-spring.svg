  <path class="hill-ground" d="M0,470 Q400,440 800,468 T1600,460 T2400,468 L2400,500 L0,500 Z"/>
  <g>
    <use href="#tree-large" x="200" y="460"/>
    <use href="#tree-large" x="550" y="460"/>
    <use href="#tree-small" x="900" y="480"/>
    <use href="#tree-large" x="1250" y="490"/>
    <use href="#tree-large" x="1600" y="460"/>
    <use href="#tree-large" x="1950" y="450"/>
    <use href="#tree-small" x="2250" y="460"/>
  </g>
