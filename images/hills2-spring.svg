  <use href="#cluster-4" x="1120" y="485"/>
  <use href="#cluster-3" x="1250" y="490"/>
  <use href="#cluster-5" x="1400" y="475"/>
  <use href="#cluster-4" x="1530" y="468"/>
  <use href="#cluster-3" x="1680" y="462"/>
  <circle class="flower" cx="1750" cy="460" r="2"/>
  <use href="#cluster-5" x="1890" y="465"/>
  <use href="#cluster-4" x="2020" y="465"/>
  <circle class="flower-light" cx="2100" cy="470" r="2.5"/>
