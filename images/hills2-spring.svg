<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 500" preserveAspectRatio="xMidYMax slice">
  <defs>
    <style>
      .hill-ground   { fill: var(--hill-ground, #2a4a38); }
      .trunk         { fill: var(--trunk, #4a3010); }
      .foliage-light { fill: var(--foliage-light, #6aaa4a); }
      .foliage-dark  { fill: var(--foliage-dark, #5a9a3a); }
      .flower        { fill: var(--flower, #ffb0c8); }
      .flower-light  { fill: var(--flower-light, #ffc0d0); }
    </style>
    <g id="tree-large">
      <rect class="trunk" x="-2" y="-18" width="4" height="18" rx="1"/>
      <circle class="foliage-light" cx="0" cy="-26" r="13"/>
      <circle class="foliage-dark" cx="-8" cy="-20" r="10"/>
      <circle class="foliage-dark" cx="8" cy="-20" r="10"/>
      <circle class="foliage-light" cx="0" cy="-14" r="8"/>
      <circle class="flower" cx="-4" cy="-30" r="3"/>
      <circle class="flower-light" cx="5" cy="-24" r="3"/>
      <circle class="flower" cx="-3" cy="-18" r="3.5"/>
      <circle class="flower-light" cx="6" cy="-16" r="2.5"/>
    </g>
    <g id="tree-small">
      <rect class="trunk" x="-2" y="-15" width="4" height="15" rx="1"/>
      <circle class="foliage-light" cx="0" cy="-22" r="11"/>
      <circle class="foliage-dark" cx="-7" cy="-18" r="8"/>
      <circle class="foliage-dark" cx="7" cy="-18" r="8"/>
      <circle class="flower" cx="-3" cy="-26" r="2.5"/>
      <circle class="flower-light" cx="4" cy="-20" r="2.5"/>
    </g>
    <g id="cluster-3">
      <circle class="flower" cx="0" cy="0" r="2.5"/>
      <circle class="flower-light" cx="-5" cy="-3" r="2"/>
      <circle class="flower" cx="4" cy="-4" r="2"/>
    </g>
    <g id="cluster-4">
      <circle class="flower" cx="0" cy="0" r="2.5"/>
      <circle class="flower-light" cx="-6" cy="-2" r="2"/>
      <circle class="flower" cx="5" cy="-5" r="2"/>
      <circle class="flower-light" cx="2" cy="-7" r="1.5"/>
    </g>
    <g id="cluster-5">
      <circle class="flower" cx="0" cy="0" r="3"/>
      <circle class="flower-light" cx="-7" cy="-3" r="2.5"/>
      <circle class="flower" cx="6" cy="-4" r="2.5"/>
      <circle class="flower-light" cx="-3" cy="-8" r="2"/>
      <circle class="flower" cx="4" cy="-9" r="2"/>
