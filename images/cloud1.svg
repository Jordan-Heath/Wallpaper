<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120">
  <defs>
    <style>
      .cloud-base { fill: var(--cloud-base, #ccc); }
      .cloud-hl  { fill: var(--cloud-highlight, #fff); }
    </style>
    <clipPath id="cloudClip">
      <ellipse cx="55" cy="75" rx="45" ry="32"/>
      <ellipse cx="102" cy="60" rx="50" ry="38"/>
      <ellipse cx="150" cy="72" rx="42" ry="30"/>
      <rect x="12" y="75" width="177" height="22" rx="11"/>
    </clipPath>
  </defs>

  <g class="cloud-base">
    <ellipse cx="55" cy="75" rx="45" ry="32"/>
    <ellipse cx="102" cy="60" rx="50" ry="38"/>
    <ellipse cx="150" cy="72" rx="42" ry="30"/>
    <rect x="12" y="75" width="177" height="22" rx="11"/>
  </g>

  <g clip-path="url(#cloudClip)">
    <g class="cloud-hl" transform="translate(-20, -20)" opacity="0.4">
      <ellipse cx="55" cy="75" rx="45" ry="32"/>
      <ellipse cx="102" cy="60" rx="50" ry="38"/>
      <ellipse cx="150" cy="72" rx="42" ry="30"/>
      <rect x="12" y="75" width="177" height="22" rx="11"/>
    </g>
  </g>
</svg>
